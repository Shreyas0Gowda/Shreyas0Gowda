<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 220" width="100%" height="auto">
  <defs>
    <!-- Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" /> <!-- Electric Cyan -->
      <stop offset="50%" stop-color="#3B82F6" /> <!-- Royal Blue -->
      <stop offset="100%" stop-color="#E2E8F0" /> <!-- Platinum/Silver -->
    </linearGradient>
    <radialGradient id="glowCyan" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowSilver" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#E2E8F0" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <pattern id="gridPattern" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" />
    </pattern>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;display=swap');
      
      .bg { fill: #070A13; }
      .title {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 38px;
        font-weight: 800;
        fill: #FFFFFF;
        letter-spacing: 2px;
        animation: textFadeIn 1s ease-out forwards;
      }
      .tagline {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        font-weight: 400;
        fill: #94A3B8;
        letter-spacing: 1.5px;
        opacity: 0;
        animation: fadeInUp 1s ease-out forwards;
        animation-delay: 0.6s;
      }
      .glowing-rect {
        stroke: url(#primaryGrad);
        stroke-width: 1.5;
        fill: none;
        stroke-dasharray: 40 250;
        animation: borderPulse 6s linear infinite;
      }
      .circuit-line {
        stroke: #3B82F6;
        stroke-opacity: 0.25;
        stroke-width: 1.5;
        fill: none;
        stroke-dasharray: 10 150;
        animation: dash 8s linear infinite;
      }
      .circuit-line-cyan {
        stroke: #00F0FF;
        stroke-opacity: 0.25;
        stroke-width: 1.5;
        fill: none;
        stroke-dasharray: 15 180;
        animation: dash-reverse 10s linear infinite;
      }
      .glow-node {
        fill: #00F0FF;
        filter: drop-shadow(0 0 6px #00F0FF);
        animation: nodePulse 2s ease-in-out infinite alternate;
      }
      
      @keyframes textFadeIn {
        from { opacity: 0; transform: translateY(-5px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      @keyframes borderPulse {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: 290; }
      }
      
      @keyframes dash {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: -160; }
      }
      @keyframes dash-reverse {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: 195; }
      }
      @keyframes nodePulse {
        from { r: 2px; opacity: 0.4; }
        to { r: 4px; opacity: 1; }
      }
    </style>
  </defs>

  <!-- Background Base -->
  <rect width="850" height="220" class="bg" rx="10" />
  
  <!-- Glowing Background Blobs -->
  <rect width="850" height="220" fill="url(#glowCyan)" rx="10" />
  <rect width="850" height="220" fill="url(#glowSilver)" rx="10" />
  
  <!-- Grid Overlay -->
  <rect width="850" height="220" fill="url(#gridPattern)" rx="10" />
  
  <!-- Animated Tech Lines (Circuitry style) -->
  <path d="M -50 40 L 400 40 L 450 90 L 900 90" class="circuit-line" />
  <path d="M 50 180 L 350 180 L 410 120 L 900 120" class="circuit-line-cyan" />
  <path d="M 600 20 L 700 20 L 740 60 L 900 60" class="circuit-line" />
  
  <!-- Floating Nodes -->
  <circle cx="400" cy="40" class="glow-node" />
  <circle cx="450" cy="90" class="glow-node" />
  <circle cx="350" cy="180" class="glow-node" style="animation-delay: 0.5s;" />
  <circle cx="410" cy="120" class="glow-node" style="animation-delay: 0.8s;" />
  <circle cx="740" cy="60" class="glow-node" style="animation-delay: 1.2s;" />

  <!-- Outer Border Glow -->
  <rect x="1" y="1" width="848" height="218" class="glowing-rect" rx="10" />

  <!-- Text & Tagline -->
  <g transform="translate(60, 95)">
    <text x="0" y="0" class="title">SHREYAS KUMAR R</text>
    <text x="0" y="38" class="tagline">COMPUTER SCIENCE ENGINEER  |  FULL STACK DEVELOPER</text>
    <text x="0" y="60" class="tagline" style="fill: #00F0FF; font-weight: 600; animation-delay: 1.2s;">AI &amp; MULTI-AGENT SYSTEMS ENTHUSIAST</text>
  </g>
</svg>
